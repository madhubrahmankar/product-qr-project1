<!DOCTYPE html>
<html>
<head>
    <title>TrustBite Product Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 560px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }

        h1 {
            text-align: center;
            color: #1e3a5f;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cfcfcf;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #005ecb;
        }
    </style>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzqprdoeqlQ1xpeaAw16A9T6wXl3og8jUlF-FHuNTk-KgotvN6LgKxFrK1LOCgG4Bk/exec";

        function generateProductId() {
            return "TB" + Date.now();
        }

        async function submitData() {
            const productId = generateProductId();
            const productName = document.getElementById("productName").value.trim();
            const batchId = document.getElementById("batchId").value.trim();
            const manufacturerName = document.getElementById("manufacturerName").value.trim();
            const facilityLocation = document.getElementById("facilityLocation").value.trim();
            const productDescription = document.getElementById("productDescription").value.trim();
            const price = document.getElementById("price").value.trim();
            const contactInfo = document.getElementById("contactInfo").value.trim();

            if (!productName || !batchId || !manufacturerName || !facilityLocation || !productDescription || !price || !contactInfo) {
                alert("Please fill in all fields.");
                return;
            }

            const formData = new URLSearchParams();
            formData.append("action", "createProduct");
            formData.append("productId", productId);
            formData.append("productName", productName);
            formData.append("batchId", batchId);
            formData.append("manufacturerName", manufacturerName);
            formData.append("facilityLocation", facilityLocation);
            formData.append("productDescription", productDescription);
            formData.append("price", price);
            formData.append("contactInfo", contactInfo);

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: formData,
                    mode: "no-cors"
                });

                localStorage.setItem("trustbiteProductId", productId);
                localStorage.setItem("trustbiteBatchId", batchId);

                window.location.href = "qr.html?id=" + encodeURIComponent(productId);
            } catch (error) {
                console.error(error);
                alert("Error while creating product.");
            }
        }
    </script>
</head>
<body>

<div class="container">
    <h1>TrustBite</h1>
    <p>Create a new traceable product record</p>

    <label for="productName">Product Name</label>
    <input type="text" id="productName" placeholder="Enter product name">

    <label for="batchId">Batch ID</label>
    <input type="text" id="batchId" placeholder="Enter batch ID">

    <label for="manufacturerName">Manufacturer Name</label>
    <input type="text" id="manufacturerName" placeholder="Enter manufacturer name">

    <label for="facilityLocation">Facility Location</label>
    <input type="text" id="facilityLocation" placeholder="Enter facility location">

    <label for="productDescription">Product Description</label>
    <textarea id="productDescription" placeholder="Enter product description"></textarea>

    <label for="price">Price</label>
    <input type="text" id="price" placeholder="Enter price">

    <label for="contactInfo">Contact Info</label>
    <input type="text" id="contactInfo" placeholder="Enter contact information">

    <button onclick="submitData()">Create Product</button>
</div>

</body>
</html>
