<!DOCTYPE html>
<html>
<head>
    <title>TrustBite Product Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f6fa;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 760px;
            margin: 50px auto;
            background: white;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 5px 18px rgba(0,0,0,0.12);
        }

        h1 {
            text-align: center;
            color: #1e3a5f;
            margin-bottom: 25px;
        }

        h2 {
            margin-top: 35px;
            color: #1e3a5f;
        }

        .item {
            margin-bottom: 18px;
        }

        .label {
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
            color: #333;
        }

        .value {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            color: #111;
            line-height: 1.5;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #eaf1f8;
        }

        .message {
            text-align: center;
            margin-top: 80px;
            font-size: 22px;
            color: #444;
        }

        .empty-note {
            margin-top: 15px;
            padding: 14px;
            background: #f8f9fa;
            border-radius: 8px;
            color: #555;
        }
    </style>

    <script>
        async function loadProduct() {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get("id");

            const scriptURL = "Phttps://script.google.com/macros/s/AKfycbxfB-LX99Typy9ZIJ4jyJ3KkPquvTJTHVyrKc-gEgUV_6NutQurlg4wCCaNp5RKgAnE/exec";

            if (!productId) {
                document.body.innerHTML = "<div class='message'>Product ID is missing in the URL.</div>";
                return;
            }

            try {
                const response = await fetch(
                    scriptURL + "?action=getProduct&id=" + encodeURIComponent(productId)
                );

                const result = await response.json();

                if (result.status === "success" && result.product) {
                    document.getElementById("productId").innerText = result.product.productId || "";
                    document.getElementById("productName").innerText = result.product.productName || "";
                    document.getElementById("batchId").innerText = result.product.batchId || "";
                    document.getElementById("manufacturerName").innerText = result.product.manufacturerName || "";
                    document.getElementById("facilityLocation").innerText = result.product.facilityLocation || "";
                    document.getElementById("productDescription").innerText = result.product.productDescription || "";
                    document.getElementById("price").innerText = result.product.price || "";
                    document.getElementById("contactInfo").innerText = result.product.contactInfo || "";

                    const journeyTable = document.getElementById("journeyTableBody");
                    const noJourneyMessage = document.getElementById("noJourneyMessage");

                    journeyTable.innerHTML = "";

                    if (result.journeys && result.journeys.length > 0) {
                        noJourneyMessage.style.display = "none";

                        result.journeys.forEach(function(journey) {
                            const row = document.createElement("tr");

                            row.innerHTML =
                                "<td>" + (journey.stage || "") + "</td>" +
                                "<td>" + (journey.date || "") + "</td>" +
                                "<td>" + (journey.time || "") + "</td>" +
                                "<td>" + (journey.nfcTagId || "") + "</td>" +
                                "<td>" + (journey.operator || "") + "</td>" +
                                "<td>" + (journey.notes || "") + "</td>";

                            journeyTable.appendChild(row);
                        });
                    } else {
                        noJourneyMessage.style.display = "block";
                    }
                } else {
                    document.body.innerHTML = "<div class='message'>Product not found.</div>";
                }
            } catch (error) {
                console.error(error);
                document.body.innerHTML = "<div class='message'>Error loading product details.</div>";
            }
        }
    </script>
</head>
<body onload="loadProduct()">

<div class="container">
    <h1>TrustBite Traceability Details</h1>

    <div class="item">
        <span class="label">Product ID</span>
        <div id="productId" class="value"></div>
    </div>

    <div class="item">
        <span class="label">Product Name</span>
        <div id="productName" class="value"></div>
    </div>

    <div class="item">
        <span class="label">Batch ID</span>
        <div id="batchId" class="value"></div>
    </div>

    <div class="item">
        <span class="label">Manufacturer Name</span>
        <div id="manufacturerName" class="value"></div>
    </div>

    <div class="item">
        <span class="label">Facility Location</span>
        <div id="facilityLocation" class="value"></div>
    </div>

    <div class="item">
        <span class="label">Product Description</span>
        <div id="productDescription" class="value"></div>
    </div>

    <div class="item">
        <span class="label">Price</span>
        <div id="price" class="value"></div>
    </div>

    <div class="item">
        <span class="label">Contact Info</span>
        <div id="contactInfo" class="value"></div>
    </div>

    <h2>Journey Details</h2>

    <div id="noJourneyMessage" class="empty-note" style="display:none;">
        No journey records have been added yet.
    </div>

    <table>
        <thead>
            <tr>
                <th>Stage</th>
                <th>Date</th>
                <th>Time</th>
                <th>NFC Tag ID</th>
                <th>Operator</th>
                <th>Notes</th>
            </tr>
        </thead>
        <tbody id="journeyTableBody"></tbody>
    </table>
</div>

</body>
</html>
