<!DOCTYPE html>
<html>
<head>
    <title>TrustBite QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef3f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 560px;
            margin: 60px auto;
            background: white;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            text-align: center;
        }

        h2 {
            color: #1e3a5f;
            margin-bottom: 20px;
        }

        #qrcode {
            margin: 25px auto;
            display: flex;
            justify-content: center;
        }

        .button-group {
            margin-top: 20px;
        }

        button, a.download-btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            background: #007bff;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover, a.download-btn:hover {
            background: #005ecb;
        }

        .secondary {
            background: #28a745;
        }

        .secondary:hover {
            background: #1f7f35;
        }

        .note {
            color: #555;
            margin-top: 10px;
            line-height: 1.6;
        }

        #qrText {
            margin-top: 15px;
            word-break: break-all;
            font-size: 14px;
        }
    </style>

    <script>
        function getProductId() {
            const params = new URLSearchParams(window.location.search);
            return params.get("id") || localStorage.getItem("trustbiteProductId") || "";
        }

        function generateQR() {
            const productId = getProductId();

            if (!productId) {
                document.body.innerHTML = "<div style='text-align:center;margin-top:80px;font-family:Arial;'>Product ID not found.</div>";
                return;
            }

            const displayURL =
                "https://madhubrahmankar.github.io/product-qr-project1/display.html?id=" +
                encodeURIComponent(productId);

            new QRCode(document.getElementById("qrcode"), {
                text: displayURL,
                width: 220,
                height: 220
            });

            document.getElementById("qrText").innerHTML =
                "<a href='" + displayURL + "' target='_blank'>" + displayURL + "</a>";

            setTimeout(function () {
                const qrImage = document.querySelector("#qrcode img");
                const qrCanvas = document.querySelector("#qrcode canvas");

                if (qrImage) {
                    document.getElementById("downloadLink").href = qrImage.src;
                } else if (qrCanvas) {
                    document.getElementById("downloadLink").href = qrCanvas.toDataURL("image/png");
                }
            }, 500);
        }

        function addAnotherProduct() {
            window.location.href = "index.html";
        }

        function goToJourneyPage() {
            const productId = getProductId();
            const batchId = localStorage.getItem("trustbiteBatchId") || "";
            window.location.href = "journey.html?id=" + encodeURIComponent(productId) + "&batchId=" + encodeURIComponent(batchId);
        }
    </script>
</head>
<body onload="generateQR()">

<div class="container">
    <h2>TrustBite QR Code Generated</h2>

    <div id="qrcode"></div>

    <p class="note">Scan this QR code to open the product traceability page.</p>
    <p id="qrText"></p>

    <div class="button-group">
        <a id="downloadLink" class="download-btn" download="trustbite-qr.png">Download QR Code</a>
        <button class="secondary" onclick="addAnotherProduct()">Add Another Product</button>
        <button onclick="goToJourneyPage()">Log Journey Event</button>
    </div>
</div>

</body>
</html>
