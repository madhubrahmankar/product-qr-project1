<!DOCTYPE html>
<html>
<head>
    <title>TrustBite Journey Logger</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 560px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }

        h1 {
            text-align: center;
            color: #1e3a5f;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cfcfcf;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 80px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #005ecb;
        }
    </style>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWZb3QosjMTiICU4T_bwMnoJg8fHMQL6gYrfuiXasNXamgqU-peazxdIh713H0Ya9O/exec";

        function fillProductInfo() {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get("id") || localStorage.getItem("trustbiteProductId") || "";
            const batchId = params.get("batchId") || localStorage.getItem("trustbiteBatchId") || "";

            document.getElementById("productId").value = productId;
            document.getElementById("batchId").value = batchId;
        }

        async function logJourney() {
            const productId = document.getElementById("productId").value.trim();
            const batchId = document.getElementById("batchId").value.trim();
            const stage = document.getElementById("stage").value;
            const nfcTagId = document.getElementById("nfcTagId").value.trim();
            const operator = document.getElementById("operator").value.trim();
            const notes = document.getElementById("notes").value.trim();

            if (!productId || !batchId || !stage || !nfcTagId || !operator) {
                alert("Please fill in Product ID, Batch ID, Stage, NFC Tag ID, and Operator.");
                return;
            }

            const formData = new URLSearchParams();
            formData.append("action", "logJourney");
            formData.append("productId", productId);
            formData.append("batchId", batchId);
            formData.append("stage", stage);
            formData.append("nfcTagId", nfcTagId);
            formData.append("operator", operator);
            formData.append("notes", notes);

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: formData,
                    mode: "no-cors"
                });

                alert("Journey event recorded successfully.");
                document.getElementById("nfcTagId").value = "";
                document.getElementById("operator").value = "";
                document.getElementById("notes").value = "";
            } catch (error) {
                console.error(error);
                alert("Error while recording journey event.");
            }
        }
    </script>
</head>
<body onload="fillProductInfo()">

<div class="container">
    <h1>TrustBite Journey Logger</h1>

    <label for="productId">Product ID</label>
    <input type="text" id="productId" placeholder="Enter product ID">

    <label for="batchId">Batch ID</label>
    <input type="text" id="batchId" placeholder="Enter batch ID">

    <label for="stage">Stage</label>
    <select id="stage">
        <option value="Harvest">Harvest</option>
        <option value="Packed">Packed</option>
        <option value="Transported">Transported</option>
        <option value="Retail Shelf">Retail Shelf</option>
    </select>

    <label for="nfcTagId">NFC Tag ID</label>
    <input type="text" id="nfcTagId" placeholder="Enter NFC tag ID">

    <label for="operator">Operator</label>
    <input type="text" id="operator" placeholder="Enter operator name">

    <label for="notes">Notes</label>
    <textarea id="notes" placeholder="Optional notes"></textarea>

    <button onclick="logJourney()">Record Journey Event</button>
</div>

</body>
</html>
