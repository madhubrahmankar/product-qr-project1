<!DOCTYPE html>
<html>
<head>
    <title>TrustBite Journey Logger</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 560px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }

        h1 {
            text-align: center;
            color: #1e3a5f;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 22px;
        }

        .section {
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid #e5e7eb;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: bold;
            color: #222;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cfcfcf;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }

        input[readonly] {
            background: #f3f4f6;
            color: #555;
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #005ecb;
        }

        .secondary-btn {
            background: #10b981;
            margin-top: 12px;
        }

        .secondary-btn:hover {
            background: #059669;
        }

        .small-note {
            margin-top: 8px;
            color: #666;
            font-size: 13px;
            line-height: 1.5;
        }

        .success-box {
            display: none;
            margin-top: 20px;
            padding: 14px;
            border-radius: 8px;
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .error-box {
            display: none;
            margin-top: 20px;
            padding: 14px;
            border-radius: 8px;
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
    </style>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzqprdoeqlQ1xpeaAw16A9T6wXl3og8jUlF-FHuNTk-KgotvN6LgKxFrK1LOCgG4Bk/exec";

        function getUrlParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name) || "";
        }

        function loadJourneyPage() {
            const productId = getUrlParam("id");
            const batchId = getUrlParam("batchId");

            document.getElementById("productId").value = productId;
            document.getElementById("batchId").value = batchId;

            const savedOperator = localStorage.getItem("trustbiteOperatorName") || "";
            document.getElementById("operator").value = savedOperator;

            if (!productId) {
                showError("Product ID is missing in the NFC link.");
            }
        }

        function saveOperatorName() {
            const operatorName = document.getElementById("operator").value.trim();

            if (!operatorName) {
                alert("Please enter the operator name first.");
                return;
            }

            localStorage.setItem("trustbiteOperatorName", operatorName);
            alert("Operator name saved on this device.");
        }

        async function logJourney() {
            hideMessages();

            const productId = document.getElementById("productId").value.trim();
            const batchId = document.getElementById("batchId").value.trim();
            const stage = document.getElementById("stage").value;
            const operator = document.getElementById("operator").value.trim();
            const notes = document.getElementById("notes").value.trim();

            if (!productId) {
                showError("Product ID is missing.");
                return;
            }

            if (!batchId) {
                showError("Batch ID is missing.");
                return;
            }

            if (!stage) {
                showError("Please choose the stage.");
                return;
            }

            if (!operator) {
                showError("Please enter the operator name.");
                return;
            }

            const formData = new URLSearchParams();
            formData.append("action", "logJourney");
            formData.append("productId", productId);
            formData.append("batchId", batchId);
            formData.append("stage", stage);
            formData.append("operator", operator);
            formData.append("notes", notes);

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: formData,
                    mode: "no-cors"
                });

                localStorage.setItem("trustbiteOperatorName", operator);

                showSuccess("Journey event recorded successfully.");

                document.getElementById("notes").value = "";
            } catch (error) {
                console.error(error);
                showError("Error while recording journey event.");
            }
        }

        function showSuccess(message) {
            const box = document.getElementById("successBox");
            box.innerText = message;
            box.style.display = "block";
        }

        function showError(message) {
            const box = document.getElementById("errorBox");
            box.innerText = message;
            box.style.display = "block";
        }

        function hideMessages() {
            document.getElementById("successBox").style.display = "none";
            document.getElementById("errorBox").style.display = "none";
        }
    </script>
</head>
<body onload="loadJourneyPage()">

<div class="container">
    <h1>TrustBite Journey Logger</h1>
    <div class="subtitle">Staff scan page opened from NFC tag</div>

    <label for="productId">Product ID</label>
    <input type="text" id="productId" readonly>

    <label for="batchId">Batch ID</label>
    <input type="text" id="batchId" readonly>

    <div class="section">
        <label for="operator">Operator Name</label>
        <input type="text" id="operator" placeholder="Enter operator name for this device">
        <button type="button" class="secondary-btn" onclick="saveOperatorName()">Save Operator Name On This Device</button>
        <div class="small-note">
            Save once on each staff device. Next time it will fill automatically.
        </div>
    </div>

    <div class="section">
        <label for="stage">Stage</label>
        <select id="stage">
            <option value="Harvest">Harvest</option>
            <option value="Packed">Packed</option>
            <option value="Transported">Transported</option>
            <option value="Retail Shelf">Retail Shelf</option>
        </select>

        <label for="nfcTagId">NFC Tag ID</label>
        <input type="text" id="nfcTagId" placeholder="Optional tag code or label">

        <label for="notes">Notes</label>
        <textarea id="notes" placeholder="Optional notes"></textarea>

        <button type="button" onclick="logJourney()">OK</button>
    </div>

    <div id="successBox" class="success-box"></div>
    <div id="errorBox" class="error-box"></div>
</div>

</body>
</html>
